<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Contact.css">
</head>

<body>
    <nav class="navbar">
        <a href="Home.html" class="nav-logo">Portfolio<span>.</span></a>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="Home.html">Home</a></li>
            <li><a href="About.html">About</a></li>
            <li><a href="Service.html">Services</a></li>
            <li><a href="Contact.html" class="active">Contact</a></li>
        </ul>
        <div class="nav-overlay" id="navOverlay"></div>
    </nav>
    <script>
        const ham = document.getElementById('hamburger');
        const nav = document.getElementById('navLinks');
        const overlay = document.getElementById('navOverlay');
        ham.addEventListener('click', () => { nav.classList.toggle('open'); overlay.classList.toggle('show'); ham.classList.toggle('active'); });
        overlay.addEventListener('click', () => { nav.classList.remove('open'); overlay.classList.remove('show'); ham.classList.remove('active'); });
    </script>
    <section class="contact-section">
        <div class="contact-header">
            <p class="section-label">Get In Touch</p>
            <h1 class="contact-title">Contact <span class="highlight">Me!</span></h1>
        </div>
        <div class="contact-card">
            <form class="contact-form" onsubmit="return false;">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Your full name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="your@email.com">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="number" placeholder="+91 00000 00000">
                    </div>
                    <div class="form-group">
                        <label>Subject</label>
                        <input type="text" placeholder="Email subject">
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>Message</label>
                    <textarea placeholder="Type your message here..." rows="5"></textarea>
                </div>
                <button type="submit" class="send-btn">Send Message</button>
            </form>
        </div>
    </section>

</body>

</html>
