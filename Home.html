<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <a href="Home.html" class="nav-logo">Portfolio<span>.</span></a>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="Home.html" class="active">Home</a></li>
            <li><a href="About.html">About</a></li>
            <li><a href="Service.html">Services</a></li>
            <li><a href="Contact.html">Contact</a></li>
        </ul>
        <div class="nav-overlay" id="navOverlay"></div>
    </nav>
    <script>
        const ham = document.getElementById('hamburger');
        const nav = document.getElementById('navLinks');
        const overlay = document.getElementById('navOverlay');
        ham.addEventListener('click', () => { nav.classList.toggle('open'); overlay.classList.toggle('show'); ham.classList.toggle('active'); });
        overlay.addEventListener('click', () => { nav.classList.remove('open'); overlay.classList.remove('show'); ham.classList.remove('active'); });
    </script>
    <section class="hero">
        <div class="hero-text">
            <p class="hero-greeting">Hello, it's me</p>
            <h1 class="hero-name">Gowtham M</h1>
            <h2 class="hero-role">And I'm a <span class="highlight">Web Developer</span></h2>
            <p class="hero-desc">Lorem ipsum dolor sit amet, consectetur adipisicing elit.<br>
                Earum quia quos aut. Deleniti tenetur maxime.</p>
            <div class="hero-socials">
                <a href="#" class="social-btn" title="Facebook">f</a>
                <a href="#" class="social-btn" title="LinkedIn">in</a>
                <a href="#" class="social-btn" title="Twitter">𝕏</a>
                <a href="#" class="social-btn" title="YouTube">▶</a>
            </div>
            <a href="Contact.html" class="hire-btn">Hire Me</a>
        </div>
        <div class="hero-photo">
            <div class="photo-ring">
                <div class="photo"></div>
            </div>
        </div>
    </section>

</body>

</html>
